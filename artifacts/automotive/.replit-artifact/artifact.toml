kind = "web"
previewPath = "/"
title = "Premium Automotive Marketplace"
version = "1.0.0"
id = "artifacts/automotive"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18902

[services.development]
run = "pnpm --filter @workspace/automotive run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/automotive", "run", "build" ]
publicDir = "artifacts/automotive/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18902"
BASE_PATH = "/"
